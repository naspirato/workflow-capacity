name: Deploy comparison page

on:
  push:
    branches:
      - cursor/capacity-comparison-html-e727
      - main
    paths:
      - capacity_comparison.html
      - .github/workflows/deploy-comparison-page.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp capacity_comparison.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
