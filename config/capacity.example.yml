# Cloud folder quotas (Compute Cloud).
quotas:
  instances: 110
  vcpu: 5400
  ram_gb: 23000
  nrd_ssd_gb: 200000

# Misc permanent VMs in the folder (dev boxes, etc.) — not autoscale ghrun-*.
reserved:
  vcpu: 120
  ram_gb: 400
  instances: 13
  nrd_ssd_gb: 8000

# Always-on VMs outside autoscale runner pool (see Yandex Compute Cloud export).
static_runners:
  tiny-worker:
    count: 6
    footprint:
      vcpu: 4
      ram_gb: 8
      nrd_ssd_gb: 200
  cachesrv:
    count: 1
    footprint:
      vcpu: 32
      ram_gb: 96
      nrd_ssd_gb: 4500
  gh-runners-controller:
    count: 1
    footprint:
      vcpu: 2
      ram_gb: 2
      nrd_ssd_gb: 10
  gh-runners-gw:
    count: 1
    footprint:
      vcpu: 2
      ram_gb: 1
      nrd_ssd_gb: 10

headroom_fraction: 0.9
saturated_min_shards: 2

footprints:
  build-preset-relwithdebinfo:
    vcpu: 64
    ram_gb: 256
    nrd_ssd_gb: 2417
  build-preset-release:
    vcpu: 64
    ram_gb: 256
    nrd_ssd_gb: 2417
  build-preset-release-asan:
    vcpu: 96
    ram_gb: 288
    nrd_ssd_gb: 2417
  build-preset-release-msan:
    vcpu: 64
    ram_gb: 320
    nrd_ssd_gb: 2417
  build-preset-release-tsan:
    vcpu: 64
    ram_gb: 320
    nrd_ssd_gb: 2417
  build-preset-analytic-node:
    vcpu: 64
    ram_gb: 320
    nrd_ssd_gb: 2417

# PR sharding classifier (rules applied at simulation time; raw paths cached in jobs_*.json).
pr_classify:
  file_count_threshold: 500
  heavy_path_prefixes:
    - ydb/core/
    - ydb/library/
    - ydb/public/
    - ydb/services/
    - ydb/apps/
    - yql/
    - util/
    - library/
    - contrib/
    - build/
    - devtools/
  heavy_path_exact:
    - ya.make
    - ydb/ya.make

default_footprint:
  vcpu: 96
  ram_gb: 320
  nrd_ssd_gb: 2417
